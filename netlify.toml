[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# The agentic refresh now runs in GitHub Actions (.github/workflows/atlas-agent.yml),
# which opens a PR for human review → merge to publish. The Netlify scheduled
# function is therefore disabled (no `schedule`) to avoid double daily runs; the
# function file remains for local/manual invocation.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
