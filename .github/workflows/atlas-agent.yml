name: Atlas agent (monthly refresh → PR)

# Drafts data updates and opens a Pull Request for human review.
# Merge the PR to publish (the host auto-deploys on merge to main).
# Nothing auto-publishes — the PR is the human gate.

on:
  schedule:
    # Monthly on the 1st at 07:00 UTC. Cuba asset statuses change on the order of
    # weeks/months, so monthly catches real changes without the daily Anthropic spend.
    # Run on demand any time from the Actions tab when something big happens.
    - cron: "0 7 1 * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run the Atlas agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_BODY_PATH: ${{ runner.temp }}/agent-pr-body.md
        run: npx tsx scripts/agent-pr.ts

      # Validate the agent's edits in THIS run. A PR opened by the Actions bot
      # can't trigger ci.yml (GitHub recursion guard), so the compliance tests +
      # build run here. If they fail, the job fails and no PR is opened.
      - name: Validate edits (compliance tests + build)
        run: |
          npm test
          npm run build

      - name: Open / update pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: atlas-agent/auto-refresh
          delete-branch: true
          add-paths: |
            data/opportunities.json
            data/ecosystem.json
            data/reform_cards.json
          commit-message: "chore(agent): proposed atlas data refresh"
          title: "Atlas agent: proposed data updates"
          body-path: ${{ runner.temp }}/agent-pr-body.md
          labels: |
            agent
            review-required
